version: '3.8'

services:
  # 1. TPM Simulator (IBM TPM 2.0)
  # Provides a software-bound hardware-native interface for testing
  tpm-simulator:
    image: ghcr.io/stefanberger/swtpm:latest
    container_name: sovereign-tpm-sim
    command: >
      socket 
      --tpm2 
      --tpmstate dir=/tmp 
      --ctrl type=tcp,port=2322,bindaddr=0.0.0.0 
      --server type=tcp,port=2321,bindaddr=0.0.0.0 
      --flags not-need-init
    ports:
      - "2321:2321"
      - "2322:2322"

  # 2. Sovereign AI Stack
  # Connects to the simulator via TCTI socket
  sovereign-app:
    build: .
    container_name: sovereign-app
    depends_on:
      - tpm-simulator
    environment:
      # Tell tpm2-pytss to connect to the swtpm simulator via network socket
      - TPM2TOOLS_TCTI=swtpm:host=tpm-simulator,port=2321
      - TCTI=swtpm:host=tpm-simulator,port=2321
    volumes:
      - .:/app
    entrypoint: [""]
    command: tail -f /dev/null
