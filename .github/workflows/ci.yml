name: Sovereign CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install .[verify,bridge,agent,dashboard,dev]
        python -m pip install pytest-benchmark
        
    - name: Run Tests
      env:
        PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
      run: |
        python -m pytest tests/ --verbose -m "not requires_model and not slow"

  test-docker-attestation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Start TPM Simulator and Sovereign App
      run: |
        docker compose up --build -d
        # Wait for the containers to initialize
        sleep 10
        
    - name: Run Attestation Smoke Test
      run: |
        python scripts/verify_attestation.py
        
    - name: Teardown
      if: always()
      run: docker compose down
