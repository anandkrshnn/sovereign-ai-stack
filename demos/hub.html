<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Demo Hub | v1.0.0-GA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1.5rem;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.05em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .badge {
            background: var(--primary);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card .status {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status.pass { color: var(--success); }
        .status.fail { color: var(--danger); }

        .terminal {
            background: #020617;
            border-radius: 12px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            color: #d1d5db;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .terminal span.allow { color: var(--success); }
        .terminal span.deny { color: var(--danger); }
        .terminal span.label { color: var(--primary); font-weight: bold; }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            max-width: 900px;
            width: 100%;
            padding: 3rem;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 2rem;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content {
            animation: fadeIn 0.3s ease-out;
        }

        .footer {
            margin-top: 5rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                SOVEREIGN HUB
                <span class="badge">v1.0.0-GA</span>
            </div>
            <div id="clock" style="font-family: 'JetBrains Mono'; color: var(--text-dim)"></div>
        </header>

        <div class="grid" id="demo-grid">
            <!-- Scenarios will be injected here -->
        </div>

        <div class="footer">
            Sovereign AI Stack | Hardware-Attested Local RAG | 2026
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="modal">
            <button class="close-btn" id="close-btn">&times;</button>
            <div class="modal-content" id="modal-content"></div>
        </div>
    </div>

    <script>
        const results = {
  "timestamp": "2026-04-23T07:47:15.637945",
  "scenarios": [
    {
      "id": "healthcare",
      "name": "Healthcare",
      "output": "\n[HEALTHCARE SCENARIO] Clinic Data Isolation\nPASS: Doctor Access: ALLOWED\n   Excerpt: [result]Patient[/result] hypertension [result]trea...\nBLOCK: Nurse Cross-Tenant Access: DENIED (Sovereign Airlock enforced)\n",
      "status": "PASS"
    },
    {
      "id": "finance",
      "name": "Finance",
      "output": "\n[FINANCE SCENARIO] Confidential Recovery & Secret Scanning\nPASS: CFO Access: ALLOWED\nBLOCK: Secret Protection: PROTECTED (Policy + SecretScanner)\n",
      "status": "PASS"
    },
    {
      "id": "engineering",
      "name": "Engineering",
      "output": "\n[ENGINEERING SCENARIO] Config Privacy\nPASS: Admin Access: ALLOWED\nBLOCK: Developer Access: BLOCKED (Sovereign Fail-Closed)\n",
      "status": "PASS"
    }
  ]
};

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        const grid = document.getElementById('demo-grid');
        const overlay = document.getElementById('overlay');
        const modalContent = document.getElementById('modal-content');

        const icons = {
            healthcare: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path></svg>',
            finance: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="12" x="2" y="6" rx="2"></rect><circle cx="12" cy="12" r="2"></circle><path d="M6 12h.01M18 12h.01"></path></svg>',
            engineering: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>'
        };

        const descriptions = {
            healthcare: "PHI isolation and cardiology-aware retrieval boundaries.",
            finance: "Revenue data protection and global secret scanning.",
            engineering: "Internal configuration privacy and fail-closed secret guardrails."
        };

        function formatTerminal(text) {
            return text.split('\n').map(line => {
                if (line.includes('PASS:') || line.includes('ALLOWED')) {
                    return `<div><span class="label">SUCCESS:</span> ${line.replace('PASS:', '').replace('ALLOWED', '<span class="allow">ALLOWED</span>')}</div>`;
                }
                if (line.includes('BLOCK:') || line.includes('DENIED') || line.includes('PROTECTED') || line.includes('BLOCKED')) {
                    return `<div><span class="label">Sovereign Airlock:</span> ${line.replace('BLOCK:', '').replace('DENIED', '<span class="deny">DENIED</span>').replace('PROTECTED', '<span class="deny">PROTECTED</span>').replace('BLOCKED', '<span class="deny">BLOCKED</span>')}</div>`;
                }
                return `<div>${line}</div>`;
            }).join('');
        }

        results.scenarios.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-glow"></div>
                <div class="status pass">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    CERTIFIED SOVEREIGN
                </div>
                <h3>${icons[s.id]} ${s.name} Demo</h3>
                <p style="color: var(--text-dim); margin-bottom: 1.5rem; font-size: 0.95rem;">${descriptions[s.id]}</p>
                <div class="terminal">
                    ${formatTerminal(s.output)}
                </div>
                <div style="margin-top: 1.5rem; display: flex; flex-wrap: wrap;">
                    <span class="tag">#tenant_${s.id}_a</span>
                    <span class="tag">#abac_policy</span>
                    <span class="tag">#audit_chained</span>
                </div>
            `;
            card.onclick = () => showModal(s);
            grid.appendChild(card);
        });

        function showModal(s) {
            modalContent.innerHTML = `
                <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">${s.name} Scenario</h2>
                <p style="color: var(--text-dim); margin-bottom: 2rem; font-size: 1.1rem;">Full decision trace for scenario ${s.id}. All actions were verified against the GAIP-2030 standard.</p>
                <div class="terminal" style="height: 500px; font-size: 0.95rem;">
                    ${formatTerminal(s.output)}
                </div>
            `;
            overlay.style.display = 'flex';
        }

        document.getElementById('close-btn').onclick = () => overlay.style.display = 'none';
        window.onclick = (e) => { if (e.target == overlay) overlay.style.display = 'none'; };
    </script>
</body>
</html>
